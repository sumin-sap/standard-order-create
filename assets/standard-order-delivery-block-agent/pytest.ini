[pytest]
testpaths = prebuilt_tests tests

addopts =
    -v
    --no-header
    --timeout=600
    -s
    --cov=app
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=json:coverage.json

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    structure: Tests for file and module structure
    server: Tests for server startup and A2A endpoints
    integration: End-to-end tests that invoke the agent with a real LLM
