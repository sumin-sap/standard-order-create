apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: standard-order-delivery-block-agent
  version: 1.0.0
  description: SAP Standard Order 생성 및 RPT-1 기반 Delivery Block 위험 사전 예측 AI 에이전트

type: agent

requires:
  - apiResource:
      ordId: sap.s4:apiResource:API_SALES_ORDER_SRV:v1
      mcpTranslationFile: ../../specification/standard-order-delivery-block-agent/mcps/API_SALES_ORDER_SRV/translation.json
  - apiResource:
      ordId: sap.s4:apiResource:API_SALES_ORDER_SIMULATION_SRV:v1
      mcpTranslationFile: ../../specification/standard-order-delivery-block-agent/mcps/API_SALES_ORDER_SIMULATION_SRV/translation.json

container:
  buildPath: .
  port: 5000

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
